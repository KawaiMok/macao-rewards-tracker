# 第二階段：本機 PostgreSQL（可選）。預設後端仍使用 H2 file；若要改用 Postgres，請調整 backend application.yml。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: macao
      POSTGRES_PASSWORD: macao
      POSTGRES_DB: macao_rewards
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
