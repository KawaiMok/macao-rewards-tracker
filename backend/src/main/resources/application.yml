spring:
  datasource:
    url: jdbc:h2:file:./data/macao-rewards;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:macao-rewards-dev-secret-change-in-production-min-256-bits-please-use-long-random-string}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  campaign:
    year: 2026
    # 活動起日（含）：用於計算 weekNumber
    start-date: 2026-04-10
    # 每週天數（活動週序）
    weeks-total: 10
